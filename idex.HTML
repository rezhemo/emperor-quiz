<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>党课答题学习</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Microsoft YaHei", Arial, sans-serif; background: #f5f5f5; line-height: 1.6; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        h1 { text-align: center; color: #c00; margin-bottom: 20px; font-size: 24px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab { padding: 10px 20px; background: #ddd; border: none; cursor: pointer; border-radius: 4px; font-size: 16px; }
        .tab.active { background: #c00; color: white; }
        .progress { margin-bottom: 15px; color: #666; font-size: 14px; }
        .question { background: white; padding: 20px; margin-bottom: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .q-title { font-size: 16px; margin-bottom: 15px; color: #333; }
        .q-type { display: inline-block; background: #e8e8e8; padding: 2px 8px; border-radius: 4px; font-size: 12px; color: #666; margin-left: 10px; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .option { display: flex; align-items: flex-start; gap: 10px; padding: 10px; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; transition: background 0.2s; }
        .option:hover { background: #f0f0f0; }
        .option.selected { border-color: #c00; background: #fff5f5; }
        .option.correct { border-color: #2a0; background: #f0fff0; }
        .option.wrong { border-color: #c00; background: #fff0f0; }
        .option.disabled { pointer-events: none; }
        .opt-text { flex: 1; }
        .nav { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; flex-wrap: wrap; gap: 10px; }
        .btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .btn-primary { background: #c00; color: white; }
        .btn-primary:hover { background: #a00; }
        .btn-secondary { background: #666; color: white; }
        .btn-secondary:hover { background: #444; }
        .result-summary { background: white; padding: 20px; margin-bottom: 20px; border-radius: 8px; text-align: center; }
        .result-summary h3 { color: #333; margin-bottom: 10px; }
        .result-summary .score { font-size: 36px; color: #c00; font-weight: bold; }
        .result-detail { display: flex; justify-content: center; gap: 30px; margin-top: 10px; }
        .correct-count { color: #2a0; }
        .wrong-count { color: #c00; }
        .answer-reveal { margin-top: 10px; padding: 10px; background: #e8f5e8; border-radius: 4px; font-size: 14px; display: none; }
        .answer-reveal.show { display: block; }
        .hidden { display: none; }
        @media (max-width: 600px) { .container { padding: 10px; } .question { padding: 15px; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>党课培训答题学习</h1>
        <div class="tabs">
            <button class="tab active" onclick="showSection('danxuan')">单选题</button>
            <button class="tab" onclick="showSection('duoxuan')">多选题</button>
            <button class="tab" onclick="showSection('panduan')">判断题</button>
        </div>
        <div class="progress" id="progress"></div>
        <div id="questions"></div>
        <div class="nav">
            <button class="btn btn-secondary" onclick="prevQuestion()">上一题</button>
            <button class="btn btn-primary" onclick="checkAnswer()">提交答案</button>
            <button class="btn btn-secondary" onclick="nextQuestion()">下一题</button>
        </div>
    </div>

    <script>
    const allQuestions = {
        danxuan: [
            {q:"1. 中国共产党第二十次全国代表大会是在全党全国各族人民迈上全面建设社会主义现代化国家新征程、向_____奋斗目标进军的关键时刻召开的一次十分重要的大会。",o:["两个一百年","第一个百年","第二个百年"],a:2},
            {q:"2. 中国特色社会主义最本质的特征是_____。",o:["马克思主义科学理论指导","中国共产党领导","以人民为中心的发展思想","坚持深化改革开放"],a:1},
            {q:"3. 中国特色社会主义制度的最大优势是_____。",o:["马克思主义科学理论指导","坚持改革开放","中国共产党领导","坚持全面从严治党"],a:2},
            {q:"4. 我们经过接续奋斗，打赢了人类历史上规模最大的脱贫攻坚战，历史性地解决了_____问题。",o:["相对贫困","绝对贫困","隐性贫困","经济贫困"],a:1},
            {q:"5. 我们深入推进全面从严治党，提出和落实新时代党的建设总要求，以党的_____统领党的建设各项工作。",o:["思想建设","制度建设","政治建设","组织建设"],a:2},
            {q:"6. 经过不懈努力，党找到了_____这一跳出治乱兴衰历史周期率的第二个答案。",o:["人民监督","自我革命","社会改革","阶级斗争"],a:1},
            {q:"7. 实践告诉我们，中国共产党为什么能，中国特色社会主义为什么好，归根到底是马克思主义行，是_____的马克思主义行。",o:["中国化","时代化","中国化时代化","中国化实践化"],a:2},
            {q:"8. _____是我们立党立国、兴党兴国的根本指导思想。",o:["马克思主义","毛泽东思想","邓小平理论","习近平新时代中国特色社会主义思想"],a:0},
            {q:"9. 坚持和发展马克思主义，必须不断回答中国之问、_____、人民之问、时代之问。",o:["民族之问","现代之问","世界之问","发展之问"],a:2},
            {q:"10. 必须坚持发扬_____。增强全党全国各族人民的志气、骨气、底气。",o:["大无畏精神","奋斗精神","斗争精神","进取精神"],a:2},
            {q:"11. 新时代新征程中国共产党的中心任务就是团结带领全国各族人民全面建成_____、实现第二个百年奋斗目标，以中国式现代化全面推进中华民族伟大复兴。",o:["小康社会","社会主义强国","社会主义现代化强国","中国特色社会主义"],a:2},
            {q:"12. 坚持把发展经济的着力点放在_____上，推进新型工业化。",o:["数字经济","金融业","实体经济","虚拟经济"],a:2},
            {q:"13. 健全党统一领导、全面覆盖、权威高效的监督体系，完善权力监督制约机制，以_____为主导，促进各类监督贯通协调。",o:["党内监督","司法监督","社会监督","媒体监督"],a:0},
            {q:"14. _____是社会主义民主政治的本质属性，是最广泛、最真实、最管用的民主。",o:["直接民主","全过程人民民主","代议民主","选举民主"],a:1},
            {q:"15. 未来五年是全面建设社会主义现代化国家开局起步的关键时期，主要目标任务包括：_____取得新突破，科技自立自强能力显著提升，构建新发展格局和建设现代化经济体系取得重大进展。",o:["经济高速发展","经济平稳增长","经济高质量发展","经济绿色发展"],a:2},
            {q:"16. 党的二十大报告指出，要努力提高居民收入在国民收入分配中的比重，提高_____在初次分配中的比重。",o:["劳动报酬","资本报酬","土地报酬","技术报酬"],a:0},
            {q:"17. 党的二十大报告指出，要坚持多劳多得，鼓励勤劳致富，促进_____，增加低收入者收入，扩大中等收入群体。",o:["绝对公平","机会公平","起点公平","结果公平"],a:1},
            {q:"18. 党的二十大报告指出，必须持之以恒推进全面从严治党，深入推进新时代党的建设新的伟大工程，以党的_____引领社会革命。",o:["组织建设","政治领导","自我革命","全面领导"],a:2},
            {q:"19. 必须坚持制度治党、依规治党，以_____为根本，以民主集中制为核心，完善党内法规制度体系。",o:["宪法","法律法规","党内法规","党章"],a:3},
            {q:"20. 实现中华民族伟大复兴的中国梦，必须紧密围绕党的基本路线，坚持和加强党的_____领导。",o:["全面","政治","经济","组织"],a:0},
            {q:"21. 党的二十大把推进_____常态化制度化写入了党章。",o:["群众路线教育实践活动","三严三实专题教育","党史学习教育","不忘初心、牢记使命主题教育"],a:2},
            {q:"22. 改革开放和社会主义现代化建设深入推进，书写了经济发展和_____两大奇迹新篇章。",o:["社会相对稳定","人民安居乐业","社会长期稳定","构建新发展格局"],a:2},
            {q:"23. 全面建设社会主义现代化国家，最艰巨最繁重的任务仍然在_____。",o:["农村","城市","县域","城中村"],a:0},
            {q:"24. 全方位夯实粮食安全根基，全面落实粮食安全_____，牢牢守住十八亿亩耕地红线，逐步把永久基本农田全部建成高标准农田。",o:["政府责任","党委责任","党政同责","集体责任"],a:2},
            {q:"25. 腐败是危害党的生命力和战斗力的最大毒瘤，反腐败是最彻底的_____。",o:["党内治理","自我革命","党内监督","作风革命"],a:1},
            {q:"26. 党的二十大报告指出，要持续深化纠治四风，重点纠治_____、官僚主义，坚决破除特权思想和特权行为。",o:["形式主义","享乐主义","奢靡之风","特权主义"],a:0},
            {q:"27. 我们党要始终赢得人民拥护、巩固长期执政地位，必须时刻保持解决_____的清醒和坚定。",o:["经济发展难题","政治建设难题","大党独有难题","民生保障难题"],a:2},
            {q:"28. _____是党的优势所在，力量所在。",o:["严明的纪律体系","庞大的组织体系","健全的制度体系","严密的组织体系"],a:3},
            {q:"29. 党的二十大报告指出，要坚持和加强党中央集中统一领导，坚持不懈用新时代中国特色社会主义思想凝心铸魂，完善_____，建设堪当民族复兴重任的高素质干部队伍。",o:["党的自我革命制度规范体系","党的自我完善制度规范体系","党的自我提高制度规范体系","党的自我净化制度规范体系"],a:0},
            {q:"30. 党的二十大报告指出，深化以_____为导向的公立医院改革。",o:["营利性","互益性","公益性","服务性"],a:2},
            {q:"31. 中国共产党要领导全国各族人民为实现_____奋斗目标、实现中华民族伟大复兴的中国梦而奋斗。",o:["中国特色社会主义道路","两个一百年","第二个百年","中国式现代化道路"],a:2},
            {q:"32. 建立健全民主选举、_____、民主决策、民主管理、民主监督的制度和程序。",o:["民主议政","民主议事","民主参政","民主协商"],a:3},
            {q:"33. 坚持政治建军、改革强军、科技强军、_____、依法治军，建设一支听党指挥、能打胜仗、作风优良的人民军队，把人民军队建设成为_____军队。",o:["人才强军 世界一流","从严治军 世界先进","战略强军 世界先进","纪律强军 世界一流"],a:0},
            {q:"34. 铸牢_____意识，实现各民族共同团结奋斗、共同繁荣发展。",o:["中华民族一体化","中华民族一家亲","中华民族共同体"],a:2},
            {q:"35. 坚持节约优先、_____的方针，坚持生产发展、生活富裕、生态良好的文明发展道路。",o:["发展优先、合理保护为主","保护优先、人工恢复为主","保护优先、自然恢复为主"],a:2},
            {q:"36. 加快构建以国内_____为主体、国内国际_____相互促进的新发展格局，推动高质量发展。",o:["单循环 双循环","小循环 大循环","单循环 大循环","大循环 双循环"],a:3},
            {q:"37. 坚持依规治党、标本兼治，不断健全_____，坚持把纪律挺在前面。",o:["党内法规体系","司法监督体系","组织纪律体系","监督执法体系"],a:0},
            {q:"38. 学习党的基本知识和_____，增强四个意识、坚定四个自信、做到两个维护，是广大党员应尽的义务。",o:["党的思想路线","党的政策文件","党的历史","党的理论文献"],a:2},
            {q:"39. 党的各级领导干部要反对_____和_____，反对任何滥用职权、谋求私利的行为。",o:["利益集团 权势集团","利益代表 特权阶层","特权精英 权势团体","特权思想 特权现象"],a:3},
            {q:"40. 全党同志要坚持发扬斗争精神，增强_____，贯彻党的基本理论、基本路线、基本方略。",o:["斗争意识","斗争本领","斗争品格","斗争态度"],a:1},
            {q:"41. 我国的社会主义建设，必须从我国的国情出发，走中国特色社会主义道路，以_____全面推进中华民族伟大复兴。",o:["中国式现代化","新发展格局","新发展理念","党的建设伟大工程"],a:0},
            {q:"42. 坚持总体国家安全观，统筹_____和_____，坚决维护国家主权、安全、发展利益。",o:["效率 自由","效率 安全","发展 安全","发展 自由"],a:2},
            {q:"43. 牢牢掌握意识形态工作领导权，不断巩固_____在意识形态领域的指导地位，巩固全党全国人民团结奋斗的_____。",o:["社会主义核心价值观 共同动力来源","马克思主义 共同思想基础","中华文化 共同发展基础"],a:1},
            {q:"44. _____是中国特色社会主义的本质要求。",o:["物质富足、精神富有","共同富裕","和平发展","人与自然和谐共生"],a:1},
            {q:"45. 我们创立了新时代中国特色社会主义思想，明确坚持和发展中国特色社会主义的基本方略，提出一系列治国理政新理念新思想新战略，实现了_____新的飞跃。",o:["马克思主义中国化","马克思主义时代化","马克思主义现代化","马克思主义中国化时代化"],a:3},
            {q:"46. _____是全面建设社会主义现代化国家的首要任务。",o:["乡村振兴","高质量发展","高水平对外开放","新发展格局"],a:1},
            {q:"47. _____是党执政兴国的第一要务。",o:["发展","创新","改革"],a:0},
            {q:"48. 新时代的伟大成就是_____一道拼出来、干出来、奋斗出来的！",o:["全国各族人民","中国共产党带领中国人民","党和人民","党和国家、人民"],a:2},
            {q:"49. 我们经过接续奋斗，实现了_____这个中华民族的千年梦想。",o:["中国梦","脱贫","小康","复兴"],a:2},
            {q:"50. 中国共产党是中国工人阶级的先锋队，同时是_____的先锋队，是中国特色社会主义事业的领导核心。",o:["全体人民","中华儿女","中国人民和中华民族"],a:2},
            {q:"51. 党的最高理想和最终目标是实现_____。",o:["共产主义","中华民族伟大复兴","发展先进生产力","中国梦"],a:0},
            {q:"52. 中国共产党以马克思列宁主义、毛泽东思想、邓小平理论、三个代表重要思想、科学发展观、_____作为自己的行动指南。",o:["新时期中国特色社会主义思想","习近平新时代中国特色社会主义思想","社会主义核心价值","新发展理念"],a:1},
            {q:"53. 习近平新时代中国特色社会主义思想科学回答了_____等重大时代课题。",o:["新时代坚持和发展什么样的中国特色社会主义、怎样坚持和发展中国特色社会主义","什么是社会主义、怎样建设社会主义","建设什么样的党、怎样建设党"],a:0},
            {q:"54. 中国共产党自成立以来，始终把_____作为自己的初心使命。",o:["为中国人民谋幸福、为中华民族谋复兴","为人类谋进步、为世界谋大同","为国家谋发展、为全球谋和平"],a:0},
            {q:"55. 必须坚持和完善公有制为主体、多种所有制经济共同发展，按劳分配为主体、多种分配方式并存，_____等基本经济制度。",o:["社会主义商品经济制度","社会主义计划经济体制","社会主义市场经济体制"],a:2},
            {q:"56. 把握_____，贯彻创新、协调、绿色、开放、共享的_____，加快构建以国内大循环为主体、国内国际双循环相互促进的_____，推动高质量发展。",o:["新发展阶段 新发展理念 新发展格局","新发展理念 新发展阶段 新发展格局","新发展格局 新发展理念 新发展阶段"],a:0},
            {q:"57. 二十大党章指出，充分发挥_____作为第一资源的作用。",o:["人才","科技","创新"],a:0},
            {q:"58. 中国共产党领导人民发展社会主义民主政治。坚持_____、人民当家作主、依法治国有机统一，走中国特色社会主义政治发展道路、_____，扩大社会主义民主。",o:["党的领导 民主协商 中国特色社会主义法治道路","党的领导 中国特色社会主义法律道路","党的领导 中国特色社会主义法治道路"],a:2},
            {q:"59. 全面准确、坚定不移贯彻_____的方针，促进香港、澳门长期繁荣稳定，坚决反对和遏制台独，完成祖国统一大业。",o:["和平共处五项原则","和平统一","一国两制"],a:2},
            {q:"60. 中国共产党坚持_____的和平外交政策，坚持_____道路，坚持_____的开放战略。",o:["亲诚惠容 以我为主 互利共赢","共建共享 和平发展 友好往来","独立自主 和平发展 互利共赢"],a:2},

            {q:"28. 社会组织中党的基层组织，宣传和执行党的路线、方针、政策，领导工会、共青团等群团组织，教育管理党员，引领服务群众，推动事业发展。",o:["正确","错误"],a:0}

    };

    let currentSection = 'danxuan';
    let currentIndex = 0;
    let selectedOptions = [];
    let hasAnswered = false;

    function showSection(section) {
        currentSection = section;
        currentIndex = 0;
        hasAnswered = false;
        selectedOptions = [];
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelector(`.tab[onclick="showSection('${section}')"]`).classList.add('active');
        renderQuestion();
    }

    function renderQuestion() {
        const questions = allQuestions[currentSection];
        const q = questions[currentIndex];
        const typeLabel = currentSection === 'danxuan' ? '单选' : currentSection === 'duoxuan' ? '多选' : '判断';

        document.getElementById('progress').textContent = `第 ${currentIndex + 1} / ${questions.length} 题`;

        let optionsHtml = '';
        q.o.forEach((opt, i) => {
            const selected = selectedOptions.includes(i) ? 'selected' : '';
            optionsHtml += `<div class="option ${selected}" onclick="toggleOption(${i})">
                <span>${String.fromCharCode(65 + i}.</span>
                <span class="opt-text">${opt}</span>
            </div>`;
        });

        document.getElementById('questions').innerHTML = `
            <div class="question">
                <div class="q-title">${q.q}<span class="q-type">${typeLabel}</span></div>
                <div class="options">${optionsHtml}</div>
                <div class="answer-reveal" id="answerReveal"></div>
            </div>
        `;

        if (hasAnswered) {
            showAnswerState();
        }
    }

    function toggleOption(index) {
        if (hasAnswered) return;
        if (currentSection === 'danxuan' || currentSection === 'panduan') {
            selectedOptions = [index];
        } else {
            const i = selectedOptions.indexOf(index);
            if (i > -1) {
                selectedOptions.splice(i, 1);
            } else {
                selectedOptions.push(index);
            }
        }
        renderQuestion();
    }

    function checkAnswer() {
        if (selectedOptions.length === 0) {
            alert('请先选择答案');
            return;
        }
        hasAnswered = true;
        showAnswerState();
    }

    function showAnswerState() {
        const q = allQuestions[currentSection][currentIndex];
        const options = document.querySelectorAll('.option');
        const isMulti = currentSection === 'duoxuan';
        const correctAnswers = isMulti ? q.a : [q.a];

        options.forEach((opt, i) => {
            opt.classList.add('disabled');
            if (correctAnswers.includes(i)) {
                opt.classList.add('correct');
            }
            if (selectedOptions.includes(i) && !correctAnswers.includes(i)) {
                opt.classList.add('wrong');
            }
        });

        const answerText = isMulti
            ? `正确答案：${q.a.map(i => String.fromCharCode(65 + i)).join('、')}`
            : `正确答案：${String.fromCharCode(65 + q.a)}`;
        document.getElementById('answerReveal').innerHTML = answerText;
        document.getElementById('answerReveal').classList.add('show');
    }

    function nextQuestion() {
        const questions = allQuestions[currentSection];
        if (currentIndex < questions.length - 1) {
            currentIndex++;
            hasAnswered = false;
            selectedOptions = [];
            renderQuestion();
        }
    }

    function prevQuestion() {
        if (currentIndex > 0) {
            currentIndex--;
            hasAnswered = false;
            selectedOptions = [];
            renderQuestion();
        }
    }

    renderQuestion();
    </script>
