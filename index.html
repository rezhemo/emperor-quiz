            };
            showQuestion();

        function showQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('currentQ').textContent = currentQuestion + 1;
            document.getElementById('questionNumber').textContent = `第 ${currentQuestion + 1} / 30 题`;
            document.getElementById('questionText').textContent = q.question;

            const progress = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progressPercent').textContent = Math.round(progress) + '%';
            document.getElementById('progressFill').style.width = progress + '%';

            const optionsHtml = ['A', 'B', 'C', 'D'].map((letter, index) => `
                <div class="option" onclick="selectOption('${q.options[index].type}')">
                    <span class="option-letter">${letter}</span>
                    <span class="option-text">${q.options[index].text}</span>
                </div>
            `).join('');

            document.getElementById('options').innerHTML = optionsHtml;
        }

        function selectOption(type) {
            scores[type]++;
            currentQuestion++;

            if (currentQuestion < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('questionPage').style.display = 'none';
            document.getElementById('resultPage').style.display = 'block';

            // Find the max score
            let maxScore = 0;
            let maxEmperor = 'qinshihuang';
            for (const emperor in scores) {
                if (scores[emperor] > maxScore) {
                    maxScore = scores[emperor];
                    maxEmperor = emperor;
                }
            }

            const data = emperors[maxEmperor];
            const totalScore = questions.length;
            const matchPercent = Math.round((maxScore / totalScore) * 100);

            document.getElementById('emperorName').textContent = data.name;
            document.getElementById('matchPercent').textContent = `匹配度：${matchPercent}%`;

            const traitsHtml = data.traits.map(trait => `<li>${trait}</li>`).join('');

            document.getElementById('reason').textContent = data.reason;
            document.getElementById('leadership').textContent = data.leadership;
            document.getElementById('lesson').textContent = data.lesson;
        }
